<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mileage Logger Pro</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --bg: #f9fafb;
      --card-bg: #ffffff;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --border: #e5e7eb;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --danger: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      padding: 24px 16px;
    }

 .container { max-width: 1200px; margin: 0 auto; }

 .header { margin-bottom: 32px; }

 .header h1 { font-size: 24px; font-weight: 700; }

 .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
    }

 .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

 .card-header {
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

 .card-header h3 { font-size: 16px; font-weight: 600; }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

 .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

 .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

 .end-km {
      background: #eff6ff;
      border: 1px solid #dbeafe;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: 600;
      color: var(--accent);
      margin: 16px 0;
    }

 .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

 .btn-primary { background: var(--accent); color: white; }
 .btn-primary:hover { background: var(--accent-hover); }
 .btn-secondary { background: var(--bg); border: 1px solid var(--border); }
 .btn-danger { background: var(--danger); color: white; }
 .btn-sm { padding: 6px 12px; font-size: 13px; }

 .btn-group { display: flex; gap: 10px; margin-top: 20px; }

 .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

 .stat {
      padding: 16px;
      background: var(--bg);
      border-radius: 8px;
    }

 .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

 .stat-value {
      font-size: 20px;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 12px;
      font-weight: 600;
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

 .action-btns { display: flex; gap: 8px; }

 .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-secondary);
    }

 .toast {
      position: fixed;
      top: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      transform: translateX(400px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }

 .toast.show {
      transform: translateX(0);
      opacity: 1;
    }

 .toast.success { background: var(--success); color: white; }
 .toast.error { background: var(--danger); color: white; }

    @media (max-width: 968px) {
  .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Mileage Logger Pro</h1>
    </div>

    <div class="grid">
      <div class="card">
        <div class="card-header">
          <h3 id="formTitle">New Entry</h3>
          <button class="btn btn-sm btn-secondary" onclick="cancelEdit()" id="cancelBtn" style="display:none;">Cancel</button>
        </div>

        <div class="form-group">
          <label>Customer</label>
          <input type="text" id="customer">
        </div>

        <div class="form-group">
          <label>Location</label>
          <input type="text" id="location">
        </div>

        <div class="form-group">
          <label>Reference WO No</label>
          <input type="text" id="refNo">
        </div>

        <div class="row-2">
          <div class="form-group">
            <label>Start KM</label>
            <input type="number" id="start" oninput="calcEnd()">
          </div>
          <div class="form-group">
            <label>Total KM</label>
            <input type="number" id="total" oninput="calcEnd()">
          </div>
        </div>

        <div class="end-km">
          End KM: <span id="endDisplay">0</span>
        </div>

        <div class="row-2">
          <div class="form-group">
            <label>Toll (RM)</label>
            <input type="number" id="toll" value="0">
          </div>
          <div class="form-group">
            <label>Parking (RM)</label>
            <input type="number" id="parking" value="0">
          </div>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" onclick="submit()" id="submitBtn">Save Entry</button>
          <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>Records</h3>
          <input type="date" id="dateFilter" onchange="loadRecords()" style="width: auto;">
        </div>

        <div class="stats-grid">
          <div class="stat">
            <div class="stat-label">Sheet</div>
            <div class="stat-value" id="sheetName">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">Total KM</div>
            <div class="stat-value" id="totalKm">0 km</div>
          </div>
        </div>

        <div id="recordsTable">
          <div class="empty-state">
            <h4>No records found</h4>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzXtRyTmH89MHH88ei
